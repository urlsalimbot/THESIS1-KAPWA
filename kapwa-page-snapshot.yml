            - generic [ref=f3e49]: What We Offer
            - heading "Our Services" [level=2] [ref=f3e51]
            - paragraph [ref=f3e52]: Comprehensive social welfare programs designed to support every member of the Norzagaray community.
          - generic [ref=f3e53]:
            - generic [ref=f3e54]:
              - generic [ref=f3e55]: Social Welfare Counseling
              - generic [ref=f3e60]: Professional counseling and psychosocial support for individuals, families, and communities in need.
            - generic [ref=f3e62]:
              - generic [ref=f3e63]: Livelihood Assistance
              - generic [ref=f3e69]: Skills training, livelihood programs, and financial assistance for sustainable community development.
            - generic [ref=f3e71]:
              - generic [ref=f3e72]: Child and Youth Welfare
              - generic [ref=f3e78]: Protection and development programs for children and youth, including educational support and intervention services.
            - generic [ref=f3e80]:
              - generic [ref=f3e81]: Senior Citizen Services
              - generic [ref=f3e89]: Comprehensive support for senior citizens including social pensions, health services, and community engagement.
            - generic [ref=f3e91]:
              - generic [ref=f3e92]: Disaster Response
              - generic [ref=f3e97]: Emergency relief, rehabilitation, and recovery assistance for families affected by natural disasters and crises.
            - generic [ref=f3e99]:
              - generic [ref=f3e100]: Family and Community Welfare
              - generic [ref=f3e106]: Family counseling, community organizing, and welfare programs to strengthen family units and communities.
        - generic [ref=f3e110]:
          - generic [ref=f3e111]:
            - generic [ref=f3e112]: Getting Started
            - heading "How to Avail Services" [level=2] [ref=f3e114]
            - paragraph [ref=f3e115]: A simple four-step process to access the social welfare services you need.
          - generic [ref=f3e116]:
            - generic [ref=f3e124]:
              - generic [ref=f3e125]: Step 1
              - heading "Submit Application" [level=3] [ref=f3e127]
              - paragraph [ref=f3e128]: Visit our office or apply online through the KAPWA portal. Provide your personal information and the type of assistance you need.
            - generic [ref=f3e137]:
              - generic [ref=f3e138]: Step 2
              - heading "Initial Assessment" [level=3] [ref=f3e140]
              - paragraph [ref=f3e141]: Your application is reviewed by our social workers to determine eligibility and the appropriate program for your situation.
            - generic [ref=f3e149]:
              - generic [ref=f3e150]: Step 3
              - heading "Document Verification" [level=3] [ref=f3e152]
              - paragraph [ref=f3e153]: Submit the required documents for validation. Our team will guide you through the requirements specific to your application.
            - generic [ref=f3e160]:
              - generic [ref=f3e161]: Step 4
              - heading "Approval & Payout" [level=3] [ref=f3e163]
              - paragraph [ref=f3e164]: Once approved, you will receive the assistance through your chosen mode of disbursement. We will notify you of the schedule.
        - generic [ref=f3e166]:
          - img "MSWDO Norzagaray office and staff" [ref=f3e169]
          - generic [ref=f3e170]:
            - heading "About MSWDO Norzagaray" [level=2] [ref=f3e177]
            - paragraph [ref=f3e178]: The Municipal Social Welfare and Development Office (MSWDO) of Norzagaray, Bulacan is dedicated to providing comprehensive social welfare services to all residents. Our team of licensed social workers and dedicated staff work tirelessly to ensure that every individual and family in need receives the appropriate assistance, support, and care.
            - link "Learn More" [ref=f3e179] [cursor=pointer]:
              - /url: /about
        - generic [ref=f3e181]:
