services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kapwa
      POSTGRES_USER: kapwa
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kapwa}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kapwa"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  kapwa-server:
    build: ./kapwa-server
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: kapwa
      DB_PASSWORD: ${DB_PASSWORD:-kapwa}
      DB_NAME: kapwa
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started

  kapwa-client:
    build:
      context: ./kapwa-client
      args:
        VITE_API_URL: /api
    ports:
      - "80:80"
    depends_on:
      - kapwa-server

volumes:
  pgdata:
  miniodata:
