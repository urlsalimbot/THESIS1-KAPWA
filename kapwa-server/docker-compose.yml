# Podman short-name registries config (optional — keeps compose files clean):
#   sudo mkdir -p /etc/containers/registries.conf.d
#   sudo tee /etc/containers/registries.conf.d/99-kapwa.conf <<-'EOF'
#     [aliases]
#       "postgres" = "docker.io/library/postgres"
#       "minio/minio" = "docker.io/minio/minio"
#       "caddy" = "docker.io/library/caddy"
#     [registries.search]
#       registries = ["docker.io"]
#   EOF

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: kapwa-db
    restart: unless-stopped
    command: postgres -c shared_preload_libraries=pgaudit -c pgaudit.log=all
    environment:
      TZ: Asia/Manila
      POSTGRES_USER: ${DB_USER:-kapwa}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-kapwa}
      POSTGRES_DB: ${DB_NAME:-kapwa}
    env_file:
      - ../infra/.env.production
    volumes:
      - kapwa-data:/var/lib/postgresql/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh:z
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-kapwa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kapwa-api
    restart: unless-stopped
    expose:
      - "3000"
    # Uncomment for direct API access (bypassing Caddy), e.g. for debugging:
    # ports:
    #   - "3000:3000"
    environment:
      TZ: Asia/Manila
      DB_HOST: db
      DB_PORT: 5432
    env_file:
      - ../infra/.env.production
    healthcheck:
      test: ["CMD", "node", "-e", 'http=require("http");http.get("http://localhost:3000/api/",r=>process.exit(r.statusCode<500?0:1)).on("error",()=>process.exit(1))']
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  minio:
    image: docker.io/minio/minio:latest
    container_name: kapwa-minio
    restart: unless-stopped
    expose:
      - "9000"
      - "9001"
    command: server /data --console-address ":9001"
    env_file:
      - ../infra/.env.production
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local 2>/dev/null || wget -qO- http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  client:
    build:
      context: ../kapwa-client
      args:
        VITE_API_URL: /api
        VITE_WS_URL: ""
    container_name: kapwa-client
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    container_name: kapwa-caddy
    restart: unless-stopped
    ports:
      - "8090:80"
      - "443:443"
    volumes:
      - ../infra/Caddyfile:/etc/caddy/Caddyfile:ro,z
      - caddy-data:/data
      - ../infra/.env.production:/etc/caddy/.env:ro,z
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    depends_on:
      api:
        condition: service_healthy
      client:
        condition: service_started

volumes:
  kapwa-data:
  minio-data:
  caddy-data:
