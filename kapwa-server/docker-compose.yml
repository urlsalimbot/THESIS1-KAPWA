version: '3.8'

services:
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: kapwa-db
    environment:
      POSTGRES_USER: kapwa
      POSTGRES_PASSWORD: kapwa
      POSTGRES_DB: kapwa
    volumes:
      - kapwa-data:/var/lib/postgresql/data
      - ./init.sh:/docker-entrypoint-initdb.d/init.sh
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kapwa"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kapwa-api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: kapwa
      DB_PASSWORD: kapwa
      DB_NAME: kapwa
      JWT_SECRET: kapwa-change-in-production
      SYNC_SECRET: sync-secret-change-in-production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  kapwa-data: